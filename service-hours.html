<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Hours - PIT Learning Resources Center</title>
    <link rel="icon" type="image/png" href="./images/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'serif': ['Playfair Display', 'serif'],
                        'body': ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        'primary': '#2563eb',
                        'primary-hover': '#1d4ed8',
                        'secondary': '#7c3aed',
                        'accent': '#06b6d4',
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s ease-out',
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap');

        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .glass-effect {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .modern-card {
            background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .hover-lift {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hover-lift:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s, transform 0.8s;
        }

        .fade-in.fade-in-visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.8s, transform 0.8s;
        }

        .dropdown-link,
        .mobile-dropdown-link {
            display: block;
            padding: 0.5rem 1rem;
            margin-bottom: 0.25rem;
            border-radius: 0.375rem;
            transition: background 0.2s, color 0.2s;
        }

        .dropdown-link:last-child,
        .mobile-dropdown-link:last-child {
            margin-bottom: 0;
        }

        /* Nested dropdown styles */
        .nested-dropdown {
            position: relative;
        }

        .nested-dropdown-content {
            position: absolute;
            left: 100%;
            top: 0;
            min-width: 140px;
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            opacity: 0;
            visibility: hidden;
            transform: translateX(-10px);
            transition: all 0.3s ease;
            z-index: 60;
        }

        .nested-dropdown:hover .nested-dropdown-content {
            opacity: 1;
            visibility: visible;
            transform: translateX(0);
        }

        .nested-dropdown-link {
            display: block;
            padding: 0.5rem 1rem;
            color: #374151;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
            border-radius: 0.375rem;
            margin: 0.125rem;
        }

        .nested-dropdown-link:hover {
            background: #f3f4f6;
            color: #2563eb;
        }

        .nested-dropdown>.dropdown-link {
            position: relative;
        }

        .nested-dropdown>.dropdown-link::after {
            content: '▶';
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.75rem;
            color: #9ca3af;
        }

        .time-slot {
            transition: all 0.3s ease;
        }

        .time-slot:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .time-slot:hover .time-icon {
            color: white;
        }

        .dropdown-link,
        .mobile-dropdown-link {
            display: block;
            padding: 0.5rem 1rem;
            margin-bottom: 0.25rem;
            border-radius: 0.375rem;
            transition: background 0.2s, color 0.2s;
        }

        .dropdown-link:last-child,
        .mobile-dropdown-link:last-child {
            margin-bottom: 0;
        }
    </style>
</head>

<body class="font-body text-gray-800 bg-gray-50">
    <!-- Header Section -->
    <div id="header"></div>
    <!-- Hero Section -->
    <section class="relative bg-cover bg-center bg-no-repeat pt-32 pb-20 lg:pt-40 lg:pb-24 fade-in"
        style="background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('./images/bg.jpg');">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <div class="flex flex-col items-center">
                <div class="text-6xl mb-4 text-white"><i class="fas fa-clock"></i></div>
                <h1 class="text-4xl sm:text-5xl lg:text-6xl font-bold text-white mb-4 leading-tight font-serif">Service
                    Hours</h1>
                <p class="text-lg sm:text-xl lg:text-2xl text-white mb-6 opacity-90 leading-relaxed">Library operating
                    hours for your convenience.</p>
            </div>
        </div>
    </section>

    <!-- Service Hours Content Section -->
    <section class="py-16 bg-white fade-in">
        <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h2 class="text-3xl font-bold font-serif text-primary mb-6">Service Hours</h2>
            <div class="text-xl text-gray-800 font-semibold mb-2">Monday - Friday</div>
            <div class="text-2xl text-gray-900 font-bold mb-4">7:30 AM - 6:00 P.M. <span
                    class="block text-base font-normal text-gray-600">(No Noon Break)</span></div>
        </div>
    </section>
    <!-- Footer Section -->
    <div id="footer"></div> 
    <script src="js/header.js"></script>
    <script src="js/nav-high.js"></script>
    <script src="js/mobile-smth.js"></script> 
    <script src="js/mobile-toggle.js"></script>   
</body>

</html>
